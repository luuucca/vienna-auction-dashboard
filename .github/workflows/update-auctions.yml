name: 每日更新法拍数据

on:
  schedule:
    # 每天北京时间 09:00（UTC 01:00）自动运行
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    name: 抓取并更新 auctions.json
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci --omit=dev

      - name: 运行抓取脚本
        run: node scripts/fetch-auctions.mjs

      - name: 检查文件是否有变更
        id: diff
        run: |
          if git diff --quiet public/data/auctions.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交更新后的数据
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/auctions.json
          git commit -m "data: 自动更新法拍数据 $(date -u +'%Y-%m-%d')"
          git push

      - name: 数据无变化
        if: steps.diff.outputs.changed == 'false'
        run: echo "没有新数据，跳过提交"
